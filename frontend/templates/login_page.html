<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Expenzo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-2 mb-8">
            <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <span class="text-white text-xl font-semibold">Expenzo</span>
        </div>

        <!-- Card -->
        <div class="bg-zinc-900/50 border border-zinc-800 rounded-2xl p-8">
            <!-- Tabs -->
            <div class="flex mb-8 bg-zinc-800/50 rounded-lg p-1">
                <button 
                    id="login-tab" 
                    onclick="switchTab('login')"
                    class="flex-1 py-2.5 text-sm font-medium rounded-md transition-all bg-white text-black"
                >
                    Login
                </button>
                <button 
                    id="register-tab" 
                    onclick="switchTab('register')"
                    class="flex-1 py-2.5 text-sm font-medium rounded-md transition-all text-zinc-400 hover:text-white"
                >
                    Register
                </button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">Username</label>
                    <input 
                        type="text" 
                        id="login-username"
                        class="w-full px-4 py-3 bg-zinc-800/50 border border-zinc-700 rounded-lg text-white placeholder-zinc-500 focus:outline-none focus:border-zinc-500 transition-colors"
                        placeholder="Enter your username"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">Password</label>
                    <input 
                        type="password" 
                        id="login-password"
                        class="w-full px-4 py-3 bg-zinc-800/50 border border-zinc-700 rounded-lg text-white placeholder-zinc-500 focus:outline-none focus:border-zinc-500 transition-colors"
                        placeholder="Enter your password"
                    >
                </div>
                <button 
                    type="button" 
                    onclick="login()"
                    class="w-full py-3 bg-white text-black font-medium rounded-lg hover:bg-zinc-200 transition-colors"
                >
                    Login
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="space-y-5 hidden">
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">Username</label>
                    <input 
                        type="text" 
                        id="reg-username"
                        class="w-full px-4 py-3 bg-zinc-800/50 border border-zinc-700 rounded-lg text-white placeholder-zinc-500 focus:outline-none focus:border-zinc-500 transition-colors"
                        placeholder="Choose a username"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">Email</label>
                    <input 
                        type="email" 
                        id="reg-email"
                        class="w-full px-4 py-3 bg-zinc-800/50 border border-zinc-700 rounded-lg text-white placeholder-zinc-500 focus:outline-none focus:border-zinc-500 transition-colors"
                        placeholder="Enter your email"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">Password</label>
                    <input 
                        type="password" 
                        id="reg-password"
                        class="w-full px-4 py-3 bg-zinc-800/50 border border-zinc-700 rounded-lg text-white placeholder-zinc-500 focus:outline-none focus:border-zinc-500 transition-colors"
                        placeholder="Create a password"
                    >
                </div>
                <button 
                    type="button" 
                    onclick="register()"
                    class="w-full py-3 bg-white text-black font-medium rounded-lg hover:bg-zinc-200 transition-colors"
                >
                    Create Account
                </button>
            </form>
        </div>

        <!-- Back link -->
        <p class="text-center text-zinc-500 text-sm mt-6">
            <a href="/" class="hover:text-white transition-colors">&larr; Back to home</a>
        </p>
    </div>

    <script>
        function switchTab(tab) {
            const loginTab = document.getElementById('login-tab');
            const registerTab = document.getElementById('register-tab');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');

            if (tab === 'login') {
                loginTab.className = 'flex-1 py-2.5 text-sm font-medium rounded-md transition-all bg-white text-black';
                registerTab.className = 'flex-1 py-2.5 text-sm font-medium rounded-md transition-all text-zinc-400 hover:text-white';
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                registerTab.className = 'flex-1 py-2.5 text-sm font-medium rounded-md transition-all bg-white text-black';
                loginTab.className = 'flex-1 py-2.5 text-sm font-medium rounded-md transition-all text-zinc-400 hover:text-white';
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            }
        }
    </script>
    <script src="/static/auth.js"></script>
</body>
</html>
